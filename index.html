<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>MeEvolui</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🧠 MeEvolui</h1>

<div class="container">

  <section>
    <h2>📋 Identificação</h2>
    <textarea placeholder="H.D."></textarea>
    <textarea placeholder="H.M.A."></textarea>
    <textarea placeholder="Alergias"></textarea>
    <textarea placeholder="Comorbidades"></textarea>
    <textarea placeholder="H.P.P."></textarea>
    <textarea placeholder="H.P.C."></textarea>
    <textarea placeholder="M.U.C."></textarea>
  </section>

  <section>
    <h2>🧪 Laboratório</h2>
    <textarea id="labInput" placeholder="Cole exames aqui"></textarea>
    <button onclick="parseLab()">Organizar</button>
    <pre id="labOutput"></pre>
  </section>

  <section>
    <h2>💉 DVA</h2>
    <input id="peso" placeholder="Peso (kg)">
    <input id="dose" placeholder="Dose (mcg/kg/min)">
    <button onclick="calcDVA()">Calcular</button>
    <p id="resultadoDVA"></p>
  </section>

  <section>
    <h2>💤 Sedoanalgesia</h2>
    <input id="pesoSed" placeholder="Peso (kg)">
    <input id="doseSed" placeholder="Dose">
    <button onclick="calcSed()">Calcular</button>
    <p id="resultadoSed"></p>
  </section>

  <section>
    <h2>🧾 Prescrição</h2>
    <textarea id="prescInput"></textarea>
    <button onclick="organizarPrescricao()">Organizar</button>
    <pre id="prescOutput"></pre>
  </section>

  <section>
    <h2>🩺 Exame Físico</h2>
    <textarea placeholder="AN"></textarea>
    <textarea placeholder="AR"></textarea>
    <textarea placeholder="ACV"></textarea>
    <textarea placeholder="ABD"></textarea>
    <textarea placeholder="EXT"></textarea>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
