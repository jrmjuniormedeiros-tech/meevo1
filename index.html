
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEEVO V12</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<div class="header">
<h1>MEEVO</h1>
<p>Sua prática médica organizada e sob controle</p>
</div>

<div class="menu">
<button onclick="show('hospital')">🏥 Hospitalar</button>
<button onclick="show('agenda')">📅 Agenda</button>
<button onclick="show('financas')">💰 Finanças</button>
<button onclick="show('rotina')">🧠 Rotina</button>
</div>

<div id="hospital" class="screen active">
<h2>Hospitalar</h2>

<label>Paciente</label>
<input id="paciente">

<h3>Exame físico</h3>

<button onclick="normal()">Exame físico normal</button>

<div class="chips" id="estado">
<button>EGB</button>
<button>Regular</button>
<button>Ruim</button>
</div>

<div class="output">
<pre id="texto">GERAL:</pre>
<button onclick="copiar()">Copiar</button>
</div>

</div>

<div id="agenda" class="screen">
<h2>Agenda</h2>
<input id="agendaDesc" placeholder="Plantão">
<input id="agendaVal" type="number" placeholder="Valor">
<button onclick="addAgenda()">Adicionar</button>
<ul id="listaAgenda"></ul>
</div>

<div id="financas" class="screen">
<h2>Finanças</h2>
<input id="finDesc" placeholder="Descrição">
<input id="finVal" type="number" placeholder="Valor">
<button onclick="addFin()">Adicionar</button>
<ul id="listaFin"></ul>
</div>

<div id="rotina" class="screen">
<h2>Rotina</h2>
<input id="taskInput" placeholder="Tarefa">
<button onclick="addTask()">Adicionar</button>
<ul id="listaTask"></ul>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
