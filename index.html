<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEEVO V15</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<header>
<h1>MEEVO</h1>
<p>Sua prática médica organizada e sob controle</p>
</header>

<nav class="menu">
<button onclick="nav('home')">🏠</button>
<button onclick="nav('hospital')">🏥</button>
<button onclick="nav('agenda')">📅</button>
<button onclick="nav('financas')">💰</button>
<button onclick="nav('rotina')">🧠</button>
</nav>

<section id="home" class="screen active">
<h2>Dashboard</h2>
<div id="resumo"></div>
</section>

<section id="hospital" class="screen">
<h2>Hospitalar</h2>

<h3>Paciente</h3>
<input id="p_nome" placeholder="Nome">
<select id="p_sexo">
<option value="M">Masculino</option>
<option value="F">Feminino</option>
</select>
<button onclick="addPaciente()">Salvar paciente</button>

<h3>Exame físico (resumo)</h3>
<div class="chips" id="estado">
<button>EGB</button>
<button>EGR</button>
<button>EGRuim</button>
</div>

<pre id="ef_out"></pre>

<h3>Alertas</h3>
<input id="alerta_txt" placeholder="Descrição">
<input id="alerta_time" placeholder="minutos">
<button onclick="addAlerta()">Criar alerta</button>
<ul id="listaAlertas"></ul>

</section>

<section id="agenda" class="screen">
<h2>Agenda</h2>
<input id="ag_desc" placeholder="Evento">
<input id="ag_data" type="date">
<input id="ag_inicio" type="time">
<input id="ag_fim" type="time">
<input id="ag_valor" type="number" placeholder="Valor (plantão)">
<button onclick="addAgenda()">Adicionar</button>
<ul id="listaAgenda"></ul>
</section>

<section id="financas" class="screen">
<h2>Finanças</h2>
<input id="fin_desc" placeholder="Descrição">
<input id="fin_valor" type="number" placeholder="Valor">
<select id="fin_tipo">
<option value="fixo">Fixo</option>
<option value="variavel">Variável</option>
</select>
<button onclick="addFin()">Adicionar</button>
<ul id="listaFin"></ul>
<pre id="fin_resumo"></pre>
</section>

<section id="rotina" class="screen">
<h2>Rotina</h2>
<input id="rot_desc" placeholder="Atividade">
<input id="rot_dia" placeholder="Dia">
<input id="rot_hora" placeholder="Hora">
<button onclick="addRotina()">Adicionar</button>
<ul id="listaRotina"></ul>
</section>

</div>

<script src="app.js"></script>
</body>
</html>
