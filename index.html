<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEEVO Functional</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>MEEVO</h1>

<nav>
<button onclick="nav('hospital')">Hospitalar</button>
<button onclick="nav('agenda')">Agenda</button>
<button onclick="nav('financas')">Finanças</button>
</nav>

<div id="hospital" class="screen active">
<h2>Hospitalar</h2>

<input id="paciente" placeholder="Paciente">
<button onclick="setPaciente()">Selecionar</button>

<h3>Evolução</h3>
<textarea id="evolucao" placeholder="Digite evolução"></textarea>
<button onclick="salvarEvolucao()">Salvar</button>

<h3>PDF</h3>
<input type="file" id="pdfInput">
<pre id="pdfText"></pre>

</div>

<div id="agenda" class="screen">
<h2>Agenda</h2>
<input id="agDesc" placeholder="Evento">
<input id="agValor" type="number" placeholder="Valor">
<button onclick="addAgenda()">Adicionar</button>
<ul id="listaAgenda"></ul>
</div>

<div id="financas" class="screen">
<h2>Finanças</h2>
<ul id="listaFin"></ul>
</div>

<script src="app.js"></script>
</body>
</html>
